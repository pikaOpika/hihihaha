{% extends "base.html" %}

{% block content %}

<h1>Book List <a href="{% url "catalog:book-create" %}">+</a></h1>

<p>Search: <form action="" novalidate>
  {{ form }}
  <input type="submit" value="search">
</form></p>

<ul>
{% for book in books %}

<li><a href="{% url "catalog:book-detail" book.id %}">{{ book }}</a></li>
{% empty %}
No books
{% endfor %}
</ul>
{% endblock  %}
